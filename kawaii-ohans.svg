<svg width="1000" height="300" viewBox="0 0 700 170"
     xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c5185"/>
      <stop offset="50%" stop-color="#7cacb6"/>
      <stop offset="100%" stop-color="#d4e2ad"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Permanent title -->

  <text
      x="350"
      y="55"
      text-anchor="middle"
      font-family="Georgia, serif"
      font-size="28"
      fill="url(#gradient)"
      filter="url(#glow)">

      Shoutout to all my ohanas

  </text>

  <!-- Group 1 -->

  <text
      x="350"
      y="110"
      text-anchor="middle"
      font-family="Georgia, serif"
      font-size="24"
      fill="url(#gradient)"
      filter="url(#glow)"
      opacity="0">

      Fanta ♡ Max ♡ Missa

      <animate attributeName="opacity"
          values="0;1;1;0;0"
          keyTimes="0;0.08;0.28;0.36;1"
          dur="20s"
          repeatCount="indefinite"/>

  </text>

  <!-- Group 2 -->

  <text
      x="350"
      y="110"
      text-anchor="middle"
      font-family="Georgia, serif"
      font-size="24"
      fill="url(#gradient)"
      filter="url(#glow)"
      opacity="0">

      Sam ♡ Tuko ♡ Yohan

      <animate attributeName="opacity"
          values="0;0;1;1;0;0"
          keyTimes="0;0.32;0.40;0.60;0.68;1"
          dur="20s"
          repeatCount="indefinite"/>

  </text>

  <!-- Group 3 -->

  <text
      x="350"
      y="110"
      text-anchor="middle"
      font-family="Georgia, serif"
      font-size="24"
      fill="url(#gradient)"
      filter="url(#glow)"
      opacity="0">

      Yun ♡ Xolar ♡ Zai

      <animate attributeName="opacity"
          values="0;0;1;1;0"
          keyTimes="0;0.64;0.72;0.92;1"
          dur="20s"
          repeatCount="indefinite"/>

  </text>

</svg>
