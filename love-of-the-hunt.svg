<svg width="900" height="160" viewBox="0 0 900 160"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2c5185">
<animate attributeName="offset"
values="-1;1"
dur="6s"
repeatCount="indefinite"/>
</stop>

<stop offset="50%" stop-color="#7cacb6">
<animate attributeName="offset"
values="0;2"
dur="6s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#d4e2ad">
<animate attributeName="offset"
values="1;3"
dur="6s"
repeatCount="indefinite"/>
</stop>

</linearGradient>

</defs>

<text
x="50%"
y="50%"
dominant-baseline="middle"
text-anchor="middle"
fill="url(#gradient)"
font-size="72"
font-family="Georgia, serif"
font-weight="bold">

Love of the Hunt

</text>

</svg>
